server:
  listen_port: 10000
  worker_threads: 4

backend:
  game_servers:
    - type: "LOGIN" # 语义化标识
      host: "127.0.0.1"
      port: 9000
      connections: 2
    - type: "GAME"
      host: "127.0.0.1"
      port: 9000
      connections: 4

routing:
  login_range: [0, 999]
  game_range: [1000, 1999]

timeout:
  backend_request_ms: 1500
  client_idle_ms: 60000

limit:
  ip_qps: 200
  ip_burst: 400
  sid_qps: 50
  sid_burst: 100